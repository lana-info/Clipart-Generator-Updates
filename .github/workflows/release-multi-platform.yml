name: Release Multi Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_version:
        description: "Версия релиза (пример: 0.1.1)"
        required: true
        default: "0.1.1"

env:
  APP_VERSION: ${{ github.event.inputs.app_version || '0.1.1' }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Syntax check
        shell: powershell
        run: python -m py_compile main.py

      - name: Build app (PyInstaller)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -AppVersion ${{ env.APP_VERSION }}

      - name: Build Windows setup (Inno Setup)
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\installer.iss"

      - name: Calculate setup hash
        shell: powershell
        run: |
          $setupPath = "release\ClipartGenerator-Setup-${{ env.APP_VERSION }}.exe"
          $hash = (Get-FileHash $setupPath -Algorithm SHA256).Hash
          "WINDOWS_SETUP_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ env.APP_VERSION }}
          path: |
            release/ClipartGenerator-Setup-${{ env.APP_VERSION }}.exe
            release/VERSION.txt

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Build macOS app (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "Clipart Generator" --add-data ".env.example:." main.py

      - name: Import Apple certificate and sign app
        if: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD != '' && secrets.APPLE_KEYCHAIN_PASSWORD != '' && secrets.APPLE_CODESIGN_IDENTITY != '' }}
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          mkdir -p certs
          echo "$CERT_BASE64" | base64 --decode > certs/developer_id_application.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certs/developer_id_application.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          codesign --force --deep --options runtime --timestamp --sign "$CODESIGN_IDENTITY" "dist/Clipart Generator.app"
          codesign --verify --deep --strict --verbose=2 "dist/Clipart Generator.app"

      - name: Pack macOS app to zip
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/Clipart Generator.app" "release/ClipartGenerator-macOS-${{ env.APP_VERSION }}.zip"

      - name: Notarize macOS app zip and staple app
        if: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD != '' && secrets.APPLE_KEYCHAIN_PASSWORD != '' && secrets.APPLE_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_TEAM_ID != '' && secrets.APPLE_NOTARY_APP_PASSWORD != '' }}
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "release/ClipartGenerator-macOS-${{ env.APP_VERSION }}.zip" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD" \
            --wait

          xcrun stapler staple "dist/Clipart Generator.app"
          ditto -c -k --sequesterRsrc --keepParent "dist/Clipart Generator.app" "release/ClipartGenerator-macOS-${{ env.APP_VERSION }}.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.APP_VERSION }}
          path: |
            release/ClipartGenerator-macOS-${{ env.APP_VERSION }}.zip
